apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "peaka.fullname" . }}-be-collab-sharedb
  labels:
    app.kubernetes.io/name: {{ include "peaka.fullname" . }}-be-collab-sharedb
    {{- include "peaka.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.collabSharedb.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "peaka.fullname" . }}-be-collab-sharedb
      {{- include "peaka.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "peaka.fullname" . }}-be-collab-sharedb
        {{- include "peaka.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/env-configmap.yaml") . | sha256sum }}
    spec:
      imagePullSecrets:
        {{- if .Values.peakaContainerRegistryAccessSecret }}
        - name: {{ .Values.peakaContainerRegistryAccessSecret.name }}
        {{- end }}
        {{- range $_, $secret := .Values.imagePullSecrets }}
        - name: {{ $secret }}
        {{- end }}
      {{- if eq (include "peaka.customCA.enabled" .) "true" }}
      initContainers:
        {{- include "peaka.customCA.initContainer.node" (dict "image" (printf "%s/%s:%s" (default (include "peaka.image.registry" .) .Values.collabSharedb.image.registry) .Values.collabSharedb.image.name .Values.collabSharedb.image.tag)) | nindent 8 }}
      {{- end }}
      containers:
        - name: collab-sharedb
          image: {{ default (include "peaka.image.registry" .) .Values.collabSharedb.image.registry }}/{{ .Values.collabSharedb.image.name }}:{{ .Values.collabSharedb.image.tag }}
          imagePullPolicy: {{ default "IfNotPresent" .Values.collabSharedb.image.imagePullPolicy }}
          ports:
            - name: websocket
              containerPort: 8080
            - name: http
              containerPort: 7070
          volumeMounts:
            - mountPath: /secrets/jwt/rsa
              name: jwt-rsa-secret
              readOnly: true
            {{- if eq (include "peaka.customCA.enabled" .) "true" }}
            - name: custom-ca-bundle
              mountPath: /custom-ca-bundle
              readOnly: true
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "peaka.fullname" . }}-env-config
          {{- with .Values.collabSharedb.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.collabSharedb.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: jwt-rsa-secret
          secret:
            secretName: {{ include "peaka.fullname" . }}-jwt-rsa-secret
        {{- if eq (include "peaka.customCA.enabled" .) "true" }}
        - name: custom-ca-certs
          configMap:
            name: {{ include "peaka.fullname" . }}-custom-ca-certs
        - name: custom-ca-bundle
          emptyDir: {}
        {{- end }}
      {{- if .Values.collabSharedb.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.cloudGateway.terminationGracePeriodSeconds }}
      {{- end }}
      {{- include "peaka.common.nodeSelector" ( dict "nodeSelector" .Values.collabSharedb.nodeSelector "global" $.Values.global) | nindent 6 }}
      {{- with .Values.collabSharedb.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "peaka.common.tolerations" ( dict "tolerations" .Values.collabSharedb.tolerations "global" $.Values.global) | nindent 6 }}
