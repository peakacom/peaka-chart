{{- if eq (dig "provider" "file" (.Values.routing | default dict)) "crd" }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "peaka.fullname" . }}-dbc-routes
  labels:
    app.kubernetes.io/name: {{ include "peaka.fullname" . }}-dbc
    {{- include "peaka.labels" . | nindent 4 }}
  {{- if and .Values.ingressRoute .Values.ingressRoute.annotations }}
  annotations:
    {{- toYaml .Values.ingressRoute.annotations | nindent 4}}
  {{- end }}
spec:
  entryPoints:
    - dbc
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      priority: 1000
      middlewares:
        - name: {{ include "peaka.fullname" . }}-append-trino-extra-credential-header
      services:
        - name: {{ include "peaka.fullname" . }}-be-data-rest
          port: http
          passHostHeader: true
  {{- if (include "peaka.traefikTls.enabled" .) }}
  tls:
    secretName: {{ include "peaka.traefikTls.secretName" . | default "peaka-traefik-tls" }}
  {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "peaka.fullname" . }}-append-trino-extra-credential-header
  labels:
    app.kubernetes.io/name: {{ include "peaka.fullname" . }}-dbc
    {{- include "peaka.labels" . | nindent 4 }}
spec:
  forwardAuth:
    address: http://{{ include "peaka.fullname" . }}-be-permission-service.{{ .Release.Namespace }}.svc.cluster.local:80/auth/dbc-custom-header-handling
    authResponseHeaders: ["X-Trino-Extra-Credential", "X-Peaka-User-Id", "X-Peaka-Api-Key"]{{- end }}
