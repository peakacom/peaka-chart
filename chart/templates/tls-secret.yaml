{{- /*
!!! GOTCHA — see docs/extras/gotchas_invariants.md (#4)
This template only renders when TLS is enabled AND no external secretName is
provided — i.e. when the operator chose the inline cert+key path. The
`required` clauses below fail render if cert OR key is missing in that
branch. The recommended path is the OPPOSITE branch: set tls.secretName
and leave cert/key empty (do not put production keys in version control).
*/}}
{{- if and .Values.tls.enabled (not .Values.tls.secretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "peaka.fullname" . }}-tls-secret
type: kubernetes.io/tls
data:
  tls.crt: {{ required "tls.cert is required when not using an existing secret" .Values.tls.cert | b64enc }}
  tls.key: {{ required "tls.key is required when not using an existing secret" .Values.tls.key | b64enc }}
{{- end }}
