{{- /*
The secret name is a fixed literal: it is mounted into the Traefik pod via
traefik.deployment.additionalVolumes (subchart values cannot be templated), so
the name must be constant. When bringing an existing secret, it therefore has
to be named exactly "peaka-traefik-tls".
Reads traefikTls.* (with fallback to the legacy tls.* block) via helpers.
*/}}
{{- $enabled := include "peaka.traefikTls.enabled" . }}
{{- $secretName := include "peaka.traefikTls.secretName" . }}
{{- if and $enabled $secretName (ne $secretName "peaka-traefik-tls") }}
{{- fail "traefikTls.secretName: an existing TLS secret must be named exactly 'peaka-traefik-tls' (it is mounted into the Traefik pod under that fixed name)" }}
{{- end }}
{{- if and $enabled (not $secretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: peaka-traefik-tls
type: kubernetes.io/tls
data:
  tls.crt: {{ required "traefikTls.cert (or legacy tls.cert) is required when not using an existing secret" (include "peaka.traefikTls.cert" .) | b64enc }}
  tls.key: {{ required "traefikTls.key (or legacy tls.key) is required when not using an existing secret" (include "peaka.traefikTls.key" .) | b64enc }}
{{- end }}
