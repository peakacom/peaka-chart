apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "peaka.fullname" . }}-be-search-service
  labels:
    app.kubernetes.io/name: {{ include "peaka.fullname" . }}-be-search-service
    {{- include "peaka.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.workflowHistory.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "peaka.fullname" . }}-be-search-service
      {{- include "peaka.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "peaka.fullname" . }}-be-search-service
        {{- include "peaka.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/env-configmap.yaml") . | sha256sum }}
    spec:
      initContainers:
        {{- if eq (include "peaka.customCA.enabled" .) "true" }}
        {{- include "peaka.customCA.initContainer.java" (dict "image" (printf "%s/%s:%s" (default (include "peaka.image.registry" .) .Values.dataMigrator.image.registry) .Values.dataMigrator.image.name .Values.dataMigrator.image.tag)) | nindent 8 }}
        {{- end }}
        - name: data-migrator
          image: {{ default (include "peaka.image.registry" .) .Values.dataMigrator.image.registry }}/{{ .Values.dataMigrator.image.name }}:{{ .Values.dataMigrator.image.tag }}
          imagePullPolicy: {{ default "IfNotPresent" .Values.dataMigrator.image.imagePullPolicy }}
          env:
            - name: SERVICE_NAME
              value: be-ai-rest
          envFrom:
            - configMapRef:
                name: {{ include "peaka.fullname" . }}-env-config
          {{- if eq (include "peaka.customCA.enabled" .) "true" }}
          volumeMounts:
            - name: custom-ca-truststore
              mountPath: /truststore
              readOnly: true
          {{- end }}
        {{- if eq (include "peaka.customCA.enabled" .) "true" }}
        {{- include "peaka.customCA.initContainer.node" (dict "image" (printf "%s/%s:%s" (default (include "peaka.image.registry" .) .Values.searchService.image.registry) .Values.searchService.image.name .Values.searchService.image.tag)) | nindent 8 }}
        {{- end }}
      imagePullSecrets:
        {{- if .Values.peakaContainerRegistryAccessSecret }}
        - name: {{ .Values.peakaContainerRegistryAccessSecret.name }}
        {{- end }}
        {{- range $_, $secret := .Values.imagePullSecrets }}
        - name: {{ $secret }}
        {{- end }}
      containers:
        - name: search-service
          image: {{ default (include "peaka.image.registry" .) .Values.searchService.image.registry }}/{{ .Values.searchService.image.name }}:{{ .Values.searchService.image.tag }}
          imagePullPolicy: {{ default "IfNotPresent" .Values.searchService.image.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: {{ include "peaka.fullname" . }}-env-config
          {{- with .Values.searchService.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.searchService.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.searchService.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if eq (include "peaka.customCA.enabled" .) "true" }}
          volumeMounts:
            - name: custom-ca-bundle
              mountPath: /custom-ca-bundle
              readOnly: true
          {{- end }}
      {{- if eq (include "peaka.customCA.enabled" .) "true" }}
      volumes:
        - name: custom-ca-certs
          configMap:
            name: {{ include "peaka.fullname" . }}-custom-ca-certs
        - name: custom-ca-bundle
          emptyDir: {}
        - name: custom-ca-truststore
          emptyDir: {}
      {{- end }}
      {{- if .Values.searchService.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.searchService.terminationGracePeriodSeconds }}
      {{- end }}
      {{- include "peaka.common.nodeSelector" ( dict "nodeSelector" .Values.searchService.nodeSelector "global" $.Values.global) | nindent 6 }}
      {{- with .Values.searchService.affinity }}
      affinity:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "peaka.common.tolerations" ( dict "tolerations" .Values.searchService.tolerations "global" $.Values.global) | nindent 6 }}
