apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "peaka.pgcat.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "peaka.pgcat.fullname" . }}
spec:
  replicas: {{ .Values.pgcat.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "peaka.pgcat.fullname" . }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/pgcat/secret.yaml") . | sha256sum }}
      {{- with .Values.pgcat.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "peaka.pgcat.fullname" . }}
    spec:
      {{- with .Values.pgcat.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "peaka.pgcat.fullname" . }}
      {{- if .Values.pgcat.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.pgcat.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- if eq (include "peaka.customCA.enabled" .) "true" }}
      initContainers:
        - name: import-custom-ca-certs
          image: "{{ .Values.pgcat.image.repository }}:{{ .Values.pgcat.image.tag }}"
          command:
            - sh
            - -c
            - |
              cp /etc/ssl/certs/ca-certificates.crt /custom-ca-bundle/ca-certificates.crt 2>/dev/null \
                || cp /etc/ssl/cert.pem /custom-ca-bundle/ca-certificates.crt 2>/dev/null \
                || touch /custom-ca-bundle/ca-certificates.crt
              cat /custom-ca-certs/*.crt >> /custom-ca-bundle/ca-certificates.crt
              echo "Custom CA certificates appended to system bundle"
          volumeMounts:
            - name: custom-ca-certs
              mountPath: /custom-ca-certs
              readOnly: true
            - name: custom-ca-bundle
              mountPath: /custom-ca-bundle
      {{- end }}
      containers:
        - name: pgcat
          {{- if .Values.pgcat.containerSecurityContext }}
          securityContext:
            {{- toYaml .Values.pgcat.containerSecurityContext | nindent 12 }}
          {{- end }}
          image: "{{ .Values.pgcat.image.repository }}:{{ .Values.pgcat.image.tag }}"
          imagePullPolicy: {{ .Values.pgcat.image.pullPolicy | default "IfNotPresent" }}
          {{- if eq (include "peaka.customCA.enabled" .) "true" }}
          env:
            - name: SSL_CERT_FILE
              value: "/custom-ca-bundle/ca-certificates.crt"
          {{- end }}
          ports:
            - name: pgcat
              containerPort: {{ .Values.pgcat.configuration.general.port }}
              protocol: TCP
            - name: prometheus
              containerPort: {{ .Values.pgcat.configuration.general.prometheus_exporter_port }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: pgcat
          readinessProbe:
            tcpSocket:
              port: pgcat
          resources:
            {{- toYaml .Values.pgcat.resources | nindent 12 }}
          volumeMounts:
          - mountPath: /etc/pgcat
            name: config
          {{- if eq (include "peaka.customCA.enabled" .) "true" }}
          - name: custom-ca-bundle
            mountPath: /custom-ca-bundle
            readOnly: true
          {{- end }}
      {{- with .Values.pgcat.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pgcat.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pgcat.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      - secret:
          defaultMode: 420
          secretName: {{ include "peaka.pgcat.fullname" . }}
        name: config
      {{- if eq (include "peaka.customCA.enabled" .) "true" }}
      - name: custom-ca-certs
        configMap:
          name: {{ include "peaka.fullname" . }}-custom-ca-certs
      - name: custom-ca-bundle
        emptyDir: {}
      {{- end }}
