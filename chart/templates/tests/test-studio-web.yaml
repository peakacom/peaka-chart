apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "peaka.fullname" . }}-test-studio-web"
  labels:
    {{- include "peaka.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: curl
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      command: ["curl"]
      args:
        - "--fail"
        - "--silent"
        - "--show-error"
        - "--max-time"
        - "10"
        - "http://{{ include "peaka.fullname" . }}-fe-studio-app:80/"
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: [ALL]
