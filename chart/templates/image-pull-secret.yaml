{{- /*
!!! GOTCHA — see docs/extras/gotchas_invariants.md (#6)
The Secret body is built from .Values.imagePullSecret.gcpRegistryAuth.password,
which MUST contain the full JSON keyfile BODY — not a path on disk and not a
base64-encoded copy. Operators frequently paste the path or pre-encode; both
produce a Secret that K8s decodes into garbage and every pod hits
ImagePullBackOff. Verify before install:
  yq '.imagePullSecret.gcpRegistryAuth.password' values.yaml | head -c 1
The first byte must be '{'.
*/}}
{{- if .Values.peakaContainerRegistryAccessSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.peakaContainerRegistryAccessSecret.name }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ template "peaka.imageRegistry.secret" . }}
{{- end }}
